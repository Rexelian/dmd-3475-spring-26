<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Stuff</title>

    <style>
        .redBG {
            background-color: red;
            color: brown !important;
        }

        .happy {
            background-color: lightyellow;
        }

        .happy h1 {
            text-transform: lowercase;
            color:palevioletred;
        }

        .happy h2 {
            text-transform: lowercase;
            color: pink;
        }

        .happy button {
            border-radius: 10px;
            text-transform: lowercase;
            background-color: palevioletred;
            color: blue;
        }

        .sad {
            background-color: blue;
        }

        .sad h1 {
            font-size: 14px;
            color: #333;
        }

        .sad h2 {
            font-size: 8px;
            color: #333;
        }

        .sad button {
            background-color: transparent;
            border: 2px solid #333;
            color: #333;
        }
    </style>
</head>
<body>
    <h1 id="pageH1">DOM Stuff</h1>
    <!--document object model-->

    <button id="makeRed">Click Me</button>

    <button id="processMood">ProcessMood</button>

            var inputValue = newH1Input.value;

        })

        
        var processMoodButton = document.querySelector("#processMood");

</html>
